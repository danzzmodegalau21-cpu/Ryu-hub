<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CBT PRO MAX</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}
body{
background:#f4f6fa;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
transition:0.3s;
}
.dark{
background:#1e1e1e;
color:white;
}
.container{
width:95%;
max-width:1000px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
transition:0.3s;
}
.dark .container{background:#2c2c2c;}
h2{text-align:center;margin-bottom:20px;}
input{
width:100%;padding:10px;margin-bottom:10px;
border-radius:8px;border:1px solid #ccc;
}
button{
margin-top:8px;padding:10px;width:100%;
border:none;border-radius:8px;
background:#1e88e5;color:white;cursor:pointer;
}
button:hover{background:#1565c0;}
.level-btn{
display:inline-block;width:48%;
padding:15px;margin:1%;
text-align:center;background:#1e88e5;
color:white;border-radius:10px;cursor:pointer;
}
.timer{color:red;font-weight:bold;}
.option{
padding:10px;margin:5px 0;
border:1px solid #ccc;border-radius:8px;
cursor:pointer;
}
.option.selected{background:#43a047;color:white;}
.progress-bar{height:8px;background:#ddd;border-radius:10px;margin-bottom:10px;}
.progress{height:100%;background:#1e88e5;width:0%;}
.nav-grid{
display:grid;grid-template-columns:repeat(10,1fr);
gap:4px;margin-top:10px;
}
.nav-grid div{
background:#eee;padding:5px;
text-align:center;border-radius:4px;
cursor:pointer;font-size:12px;
}
.nav-grid .answered{background:#43a047;color:white;}
.topbar{
display:flex;justify-content:space-between;
margin-bottom:10px;
}
</style>
</head>
<body>

<div class="container" id="mainBox">
<div class="topbar">
<div>CBT PRO MAX</div>
<button onclick="toggleMode()">🌙 Mode</button>
</div>

<h2>LOGIN</h2>
<input type="text" id="nama" placeholder="Masukkan Nama">
<button onclick="chooseLevel()">Masuk</button>

<h3>🏆 Ranking</h3>
<div id="rankList"></div>
</div>

<script>
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}

let bankSD=[],bankSMP=[];
let questions=[],answers=[];
let current=0,level="",username="";
let timerInterval,timeLeft=600;

/* ===== SOAL ===== */
for(let i=1;i<=100;i++){
bankSD.push({
question:`${i}+${i}=?`,
options:[i*2,i*2+1,i*2-1,i*2+2].map(String),
answer:0
});
bankSMP.push({
question:`2x+${i}=${i+10}, x=?`,
options:["5","4","3","6"],
answer:0
});
}

/* ===== DARK MODE ===== */
function toggleMode(){
document.body.classList.toggle("dark");
}

/* ===== RANKING LOCAL ===== */
function loadRanking(){
let data=JSON.parse(localStorage.getItem("ranking")||"[]");
data.sort((a,b)=>b.score-a.score);
let list=document.getElementById("rankList");
if(!list) return;
list.innerHTML="";
data.slice(0,5).forEach((d,i)=>{
list.innerHTML+=`${i+1}. ${d.name} - ${d.score}<br>`;
});
}
loadRanking();

function saveScore(name,score){
let data=JSON.parse(localStorage.getItem("ranking")||"[]");
data.push({name,score});
localStorage.setItem("ranking",JSON.stringify(data));
}

/* ===== LOGIN ===== */
function chooseLevel(){
username=document.getElementById("nama").value.trim();
if(username===""){alert("Isi nama dulu");return;}
document.getElementById("mainBox").innerHTML=`
<h2>Pilih Jenjang</h2>
<div class="level-btn" onclick="startQuiz('SD')">TKA SD</div>
<div class="level-btn" onclick="startQuiz('SMP')">TKA SMP</div>
`;
}

/* ===== START QUIZ ===== */
function startQuiz(lv){
level=lv;
questions=shuffle(level==="SD"?bankSD:bankSMP);
answers=new Array(100).fill(null);
current=0;
timeLeft=600;

document.getElementById("mainBox").innerHTML=`
<div class="topbar">
<div>${username} - ${level}</div>
<div class="timer" id="timer"></div>
</div>
<div class="progress-bar"><div class="progress" id="progress"></div></div>
<div id="question"></div>
<div id="options"></div>
<button onclick="nextQuestion()">Next</button>
<button onclick="submitQuiz()">Submit</button>
<div class="nav-grid" id="navGrid"></div>
`;

createNav();
loadQuestion();
startTimer();
}

/* ===== TIMER ===== */
function startTimer(){
updateTimer();
timerInterval=setInterval(()=>{
timeLeft--;
updateTimer();
if(timeLeft<=0){submitQuiz();}
},1000);
}

function updateTimer(){
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
document.getElementById("timer").innerText=
"Waktu: "+m+":"+ (s<10?"0"+s:s);
}

/* ===== NAVIGATION ===== */
function createNav(){
let grid=document.getElementById("navGrid");
for(let i=0;i<100;i++){
let box=document.createElement("div");
box.innerText=i+1;
box.onclick=()=>{current=i;loadQuestion();}
grid.appendChild(box);
}
}

function loadQuestion(){
document.getElementById("question").innerText=
(current+1)+". "+questions[current].question;

let optDiv=document.getElementById("options");
optDiv.innerHTML="";
questions[current].options.forEach((opt,i)=>{
let btn=document.createElement("div");
btn.className="option";
btn.innerText=opt;
if(answers[current]===i) btn.classList.add("selected");
btn.onclick=()=>{
answers[current]=i;
loadQuestion();
updateNav();
};
optDiv.appendChild(btn);
});
document.getElementById("progress").style.width=
((current+1)/100*100)+"%";
updateNav();
}

function updateNav(){
let boxes=document.querySelectorAll(".nav-grid div");
boxes.forEach((b,i)=>{
b.classList.remove("answered");
if(answers[i]!==null) b.classList.add("answered");
});
}

function nextQuestion(){
if(current<99){current++;loadQuestion();}
}

/* ===== SUBMIT ===== */
function submitQuiz(){
clearInterval(timerInterval);
let score=0;
for(let i=0;i<100;i++){
if(answers[i]===questions[i].answer) score++;
}
saveScore(username,score);

document.getElementById("mainBox").innerHTML=`
<h2>🎓 SERTIFIKAT KELULUSAN</h2>
<p>Nama: <b>${username}</b></p>
<p>Level: ${level}</p>
<h3>Skor: ${score}/100</h3>
<button onclick="window.print()">Cetak Sertifikat</button>
<button onclick="location.reload()">Kembali</button>
`;
}
</script>

</body>
</html>
